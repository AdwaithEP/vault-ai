{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultAI — Add Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="app-shell">
  <!-- ════════════════════════════════════
     REPLACE YOUR <aside class="sidebar"> BLOCK WITH THIS
     ════════════════════════════════════ -->

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <span class="sidebar-logo-text">VaultAI</span>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Vault</div>
    <nav class="sidebar-nav">
      <a href="{% url 'dashboard' %}" class="active">
        <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="16" r="1"/><rect x="3" y="10" width="18" height="12" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg></span>
        Passwords
        <span class="sidebar-badge">{{ passwords|length }}</span>
      </a>
    </nav>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Security</div>
    <nav class="sidebar-nav">
      <a href="{% url 'scanner' %}">
        <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        URL Scanner
      </a>
      <a href="{% url 'packet_tracer' %}">
        <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></span>
        Packet Tracer
      </a>
      <a href="{% url 'chat' %}">
        <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg></span>
        AI Bot
      </a>
    </nav>
  </div>

  <div class="sidebar-footer">
    <a href="{% url 'logout' %}">
      <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      Logout
    </a>
  </div>

  <div class="sidebar-section">
  <div class="sidebar-label">Account</div>
  <nav class="sidebar-nav">
    <a href="{% url 'settings' %}">
      <span class="nav-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
      Settings
    </a>
  </nav>
</div>

</aside>

  <main class="main-content">
    <div class="form-page-inner">
      <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
      <div class="form-card glass">
        <h2>Add <span>Password</span></h2>
        <form method="POST">
          {% csrf_token %}
          <div class="form-group">
            <label class="form-label">Site / App Name</label>
            <input type="text" name="site_name" placeholder="e.g. GitHub, Gmail, Netflix…" required>
          </div>
          <div class="form-group">
            <label class="form-label">Username / Email</label>
            <input type="text" name="username" placeholder="your@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" id="pw-input" placeholder="••••••••••" required>
            <div class="strength-bar-track">
              <div class="strength-bar-fill" id="strength-bar"></div>
            </div>
            <div class="strength-text" id="strength-text">Enter a password to check strength</div>
          </div>
          <button class="btn-primary" type="submit">Save to Vault →</button>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  const pwInput = document.getElementById('pw-input');
  const bar = document.getElementById('strength-bar');
  const text = document.getElementById('strength-text');

  pwInput.addEventListener('input', () => {
    const pw = pwInput.value;
    if (!pw.length) { bar.style.width = '0%'; text.textContent = 'Enter a password to check strength'; return; }
    const r = checkStrength(pw);
    bar.style.width = r.pct + '%';
    bar.style.background = r.color;
    text.style.color = r.color;
    text.textContent = r.label;
  });

  function checkStrength(pw) {
    let s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    if (s <= 1) return { pct: 20, color: '#ff4d6d', label: 'Weak — too short or simple' };
    if (s <= 3) return { pct: 55, color: '#f5a623', label: 'Medium — could be stronger' };
    return { pct: 100, color: '#00d2ff', label: 'Strong — great password!' };
  }
</script>
</body>
</html>

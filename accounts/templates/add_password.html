{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>VaultAI - Add Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="navbar">
        <h1>VaultAI</h1>
        <div class="navbar-links">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'chat' %}">AI Bot</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <div class="form-page">
        <div class="form-card">
            <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
            <h2>Add <span>Password</span></h2>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Site / App Name</label>
                    <input type="text" name="site_name" placeholder="e.g. GitHub, Gmail...">
                </div>
                <div class="form-group">
                    <label class="form-label">Username / Email</label>
                    <input type="text" name="username" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" placeholder="••••••••••">
                </div>
                <button class="btn-primary" type="submit">Save to Vault →</button>
            </form>
        </div>
    </div>
</body>
</html>

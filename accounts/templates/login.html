{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VaultAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card glass">
    <div class="auth-logo">
      <div class="auth-logo-icon"> <div class="auth-logo-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
  </div></div>
      <div class="auth-logo-text">VaultAI</div>
      <div class="auth-logo-sub">Secure password management with AI</div>
    </div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" placeholder="Enter your username" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="••••••••">
      </div>
      {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
      <button class="btn-primary" type="submit">Login →</button>
    </form>
    <div class="auth-footer">
      No account? <a href="{% url 'signup' %}">Sign up free</a>
    </div>
  </div>
</div>
</body>
</html>
